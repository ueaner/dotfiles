# vim: set filetype=swayconfig:
# Copy this to ~/.config/sway/config.d/host-specific/mac14.conf
# Only for Macbook keyboard

input type:keyboard {
    xkb_layout us
    xkb_model "apple"
}

# Active applications: F3 Open Mission Control
bindsym --no-repeat XF86LaunchA exec $rofi -show window
# All applications: F4 Open Launchpad
# bindsym --no-repeat XF86LaunchB exec "wtype -k Escape; $rofi -show drun"
bindsym --no-repeat XF86LaunchB exec ~/.local/bin/waylaunch --provider drun --layout launchpad

