[project]
name = "waylaunch"
version = "0.1.0"
description = "Personalized desktop environment (DE) scripts"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12.5",
]

[project.scripts]
# 注册命令行快捷命令：
# 运行：uv run waylaunch
# 安装：uv tool install -e .
waylaunch = "waylaunch.cli:main"

[build-system]
# 构建后端，uv 会自动在后台安装它们，无需手动干预
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# 核心配置：明确告诉构建后端源码在 src 目录下
packages = ["src/waylaunch"]


# [dependency-groups]
# test = ["pytest"]
# dev = [
#     { include-group = "test" }, # 开发环境自动包含测试工具
#     "ipython"
# ]

# 注册适配器，这样 detector.py 就能自动找到它们
# [project.entry-points."waylaunch.compositor.adapters"]
# sway = "compositor.sway:SwayAdapter"

[tool.mypy]
# ~/.local/share/nvim/mason/bin/mypy .
python_version = 3.12
strict = true
show_error_codes = true
pretty = true
plugins = ["pydantic.mypy"]

[tool.pyright]
# ~/.local/share/nvim/mason/bin/basedpyright
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportUnusedCallResult = false

[tool.ruff]
# ~/.local/share/nvim/mason/bin/ruff check
target-version = "py312"
line-length = 100
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "node_modules",
]

[tool.ruff.lint]
select = [
    # Style
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    # "TID",  # flake8-tidy-imports
    # Quality
    "C90",  # mccabe
    "B",    # flake8-bugbear
    "PIE",  # flake8-pie
    "RUF",  # ruff-specific rules
    "C4",   # flake8-comprehensions
    # Performance
    "PERF", # perflint
    "FLY",  # flynt
    # Security
    "S",    # flake8-bandit
]
ignore = ["E501"]  # 行长度由 formatter 处理
allowed-confusables = ["，", "（", "）", "：", "；", "？", "！"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 10

[dependency-groups]
dev = [
    "mypy>=1.19.1",
]

# [tool.ruff.lint.flake8-tidy-imports]
# ban-relative-imports = "all"
